/* ============================================================
   BRACKET ENGINE
   ============================================================ */

// Bipartite matching: assign qualified third-place groups -> slots
// respecting each slot's group-eligibility combo (augmenting paths).
function matchThirds(qualifiedGroups, slots){
  const matchSlot = {};      // slotIndex -> group
  const matchGroup = {};     // group -> slotIndex
  function augment(si, seen){
    for(const g of slots[si].groups){
      if(!qualifiedGroups.includes(g) || seen.has(g)) continue;
      seen.add(g);
      if(matchGroup[g]===undefined || augment(matchGroup[g], seen)){
        matchSlot[si]=g; matchGroup[g]=si; return true;
      }
    }
    return false;
  }
  for(let si=0; si<slots.length; si++) augment(si, new Set());
  const out = {}; // matchId -> group
  for(const si in matchSlot) out[slots[si].id] = matchSlot[si];
  return out;
}

// Resolve the full bracket given current selections.
function resolveBracket(state){
  const { standings, thirdRanking, picks } = state;
  const winner = g => standings[g][0];
  const runner = g => standings[g][1];
  const third  = g => standings[g][2];

  const qualifiedThirds = thirdRanking.slice(0,8);            // top-8 group letters
  const slotGroup = matchThirds(qualifiedThirds, THIRD_SLOTS); // matchId -> group

  const teams = {}; // matchId -> {home, away}  (codes or null)
  // R32
  R32.forEach(m=>{
    const side = s => s.t==='w'?winner(s.g) : s.t==='ru'?runner(s.g)
                    : (slotGroup[m.id]?third(slotGroup[m.id]):null);
    teams[m.id] = { home: side(m.a), away: side(m.b),
                    thirdGroup: m.b.t==='3' ? (slotGroup[m.id]||null) : null };
  });
  const winnerOf = id => { const p=picks[id]; const t=teams[id]; if(!t)return null;
    return (p && (p===t.home || p===t.away)) ? p : null; };
  const loserOf = id => { const w=winnerOf(id); const t=teams[id];
    if(!t||!w||!t.home||!t.away) return null; return w===t.home?t.away:t.home; };
  // Later rounds (in id order so deps resolve)
  LATER.forEach(m=>{
    const ref = r => r.w!==undefined ? winnerOf(r.w) : loserOf(r.l);
    teams[m.id] = { home: ref(m.a), away: ref(m.b), round:m.round };
  });

  return {
    teams, slotGroup, winnerOf, loserOf, qualifiedThirds,
    champion: winnerOf(104), runnerUp: loserOf(104), third: winnerOf(103),
  };
}

function encodeState(s){
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(s)))); } catch(e){ return ''; }
}
function decodeState(str){
  try { const s = JSON.parse(decodeURIComponent(escape(atob(str))));
    if(s && s.standings && s.thirdRanking && s.picks) return s; } catch(e){}
  return null;
}
function loadInitial(){
  const hash = location.hash.replace(/^#/,'');
  if(hash.startsWith('s=')){ const d = decodeState(hash.slice(2)); if(d) return normalize(d); }
  try { const raw = localStorage.getItem(STORAGE_KEY); if(raw){ const d=JSON.parse(raw); if(d&&d.standings) return normalize(d); } } catch(e){}
  return defaultState();
}

/* compute a group's standings table + order from entered scorelines.
   Returns {rows:[{code,P,W,D,L,GF,GA,GD,Pts}], order:[codes]} — FIFA tiebreakers
   (points, GD, GF, then head-to-head points among tied teams, then seeding). */
function computeGroup(letter, seededOrder, scores){
  const teams = GROUPS[letter];
  const st = Object.fromEntries(teams.map(c=>[c,{code:c,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}]));
  const h2h = {}; teams.forEach(a=>h2h[a]={});
  let any=false;
  GROUP_FIXTURES.forEach((fx,i)=>{
    const sc = scores && scores[i];
    if(!sc || sc.h==null || sc.a==null) return;
    any=true;
    const A=teams[fx[0]], B=teams[fx[1]], ga=sc.h, gb=sc.a;
    st[A].P++; st[B].P++; st[A].GF+=ga; st[A].GA+=gb; st[B].GF+=gb; st[B].GA+=ga;
    if(ga>gb){ st[A].W++; st[A].Pts+=3; st[B].L++; h2h[A][B]=(h2h[A][B]||0)+3; }
    else if(gb>ga){ st[B].W++; st[B].Pts+=3; st[A].L++; h2h[B][A]=(h2h[B][A]||0)+3; }
    else { st[A].D++; st[B].D++; st[A].Pts++; st[B].Pts++; h2h[A][B]=(h2h[A][B]||0)+1; h2h[B][A]=(h2h[B][A]||0)+1; }
  });
  const seedIdx = c => seededOrder.indexOf(c);
  const order = [...teams].sort((a,b)=>{
    const A=st[a], B=st[b];
    if(B.Pts!==A.Pts) return B.Pts-A.Pts;
    if((B.GF-B.GA)!==(A.GF-A.GA)) return (B.GF-B.GA)-(A.GF-A.GA);
    if(B.GF!==A.GF) return B.GF-A.GF;
    const hb=(h2h[b][a]||0), ha=(h2h[a][b]||0); if(hb!==ha) return hb-ha;
    return seedIdx(a)-seedIdx(b);
  });
  const rows = order.map(c=>{const s=st[c]; return {...s, GD:s.GF-s.GA};});
  return { rows, order, played:any };
}

/* Record (Pts/GD/GF/GA) of each group's third-placed team, for ranking. */
function thirdRecords(standings, groupScores){
  return GROUP_LETTERS.map(g=>{
    const code = standings[g][2];
    const comp = computeGroup(g, GROUPS[g], (groupScores||{})[g]);
    const row = comp.rows.find(r=>r.code===code) || {Pts:0,GD:0,GF:0,GA:0};
    return { g, code, Pts:row.Pts, GD:row.GD, GF:row.GF, GA:row.GA, played:comp.played };
  });
}
/* FIFA ranking of the 12 third-placed teams:
   points → goal difference → goals for → fewer goals against → FIFA rank (deterministic). */
function computeThirdRanking(standings, groupScores){
  return thirdRecords(standings, groupScores)
    .sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || a.GA-b.GA
                 || ((TEAMS[a.code]?.rank??99)-(TEAMS[b.code]?.rank??99)))
    .map(r=>r.g);
}

   ============================================================ */
/* Pointer-based reorder — works with mouse, touch and pen (HTML5 DnD has no
   touch support, so mobile drag-and-drop needs Pointer Events). */
function ReorderList({items, onReorder, renderItem}){
  const [order, setOrder] = useState(()=>items.map(i=>i.key));
  const [dragKey, setDragKey] = useState(null);
  const drag = useRef({active:false});

  // keep local order in sync with parent when we're not mid-drag
  useEffect(()=>{ if(!drag.current.active) setOrder(items.map(i=>i.key)); }, [items]);

  const byKey = {}; items.forEach(it=>byKey[it.key]=it);
  const ordered = order.map(k=>byKey[k]).filter(Boolean);

  const start = (e, key)=>{
    if(e.pointerType==='mouse' && e.button!==0) return;
    drag.current = {active:true, key, container:e.currentTarget.parentElement};
    setDragKey(key);
    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
  };
  const move = (e)=>{
    if(!drag.current.active) return;
    e.preventDefault();
    const kids = [...drag.current.container.children];
    const y = e.clientY;
    let target = kids.length-1;
    for(let i=0;i<kids.length;i++){
      const r = kids[i].getBoundingClientRect();
      if(y < r.top + r.height/2){ target = i; break; }
    }
    setOrder(prev=>{
      const from = prev.indexOf(drag.current.key);
      if(from<0 || from===target) return prev;
      const next=[...prev]; next.splice(from,1); next.splice(target,0,drag.current.key);
      return next;
    });
  };
  const end = ()=>{
    if(!drag.current.active) return;
    drag.current.active=false;
    setDragKey(null);
    setOrder(prev=>{ onReorder(prev.map(k=>byKey[k]).filter(Boolean)); return prev; });
  };

  return ordered.map((it,i)=>(
    <div key={it.key}
      onPointerDown={e=>start(e,it.key)}
      onPointerMove={move}
      onPointerUp={end}
      onPointerCancel={end}
      style={{touchAction:'none', userSelect:'none', WebkitUserSelect:'none'}}
      className={(dragKey===it.key?'dragging ':'')+'select-none'}>
      {renderItem(it, i)}
    </div>
  ));
}

/* ============================================================

const BK = (()=>{
  const cardW=186, cardH=64, pitch=84, PAD=28;
  const R32L=[74,77,73,75,83,84,81,82], R32R=[76,78,79,80,86,88,85,87];
  const leftX=[0,210,420,630], rightX=[1772,1562,1352,1142], finalX=886, totalW=1958;
  const slotC = i => PAD + i*pitch + cardH/2;
  function layout(){
    const pos={};
    const place=(id,x,yc)=>pos[id]={x, y:yc-cardH/2, yc};
    R32L.forEach((id,i)=>place(id,leftX[0],slotC(i)));
    R32R.forEach((id,i)=>place(id,rightX[0],slotC(i)));
    const round=(ids,lx,rx)=>ids.forEach(m=>{
      const f1=pos[m.a.w], f2=pos[m.b.w]; const yc=(f1.yc+f2.yc)/2;
      place(m.id, f1.x<finalX?lx:rx, yc);
    });
    round(LATER.filter(m=>m.round==='R16'),leftX[1],rightX[1]);
    round(LATER.filter(m=>m.round==='QF'),leftX[2],rightX[2]);
    round(LATER.filter(m=>m.round==='SF'),leftX[3],rightX[3]);
    const yMid=(pos[101].yc+pos[102].yc)/2;
    place(104,finalX,yMid);
    place(103,finalX,yMid+172);
    const height = slotC(7)+cardH/2+PAD;
    return {pos, cardW, cardH, totalW, height, finalX};
  }
  function connectors(pos){
    const segs=[];
    LATER.filter(m=>m.id!==103).forEach(m=>{
      [m.a.w,m.b.w].forEach(fid=>{
        const c=pos[fid], p=pos[m.id]; const childLeft=c.x<p.x;
        const cx=childLeft?c.x+cardW:c.x, px=childLeft?p.x:p.x+cardW;
        const mx=(cx+px)/2; segs.push(`M${cx} ${c.yc} H${mx} V${p.yc} H${px}`);
      });
    });
    return segs;
  }
  const allIds=[...R32L,...R32R,...LATER.map(m=>m.id)];
  return {layout, connectors, allIds, cardW, cardH, totalW};
})();

function Bracket({resolved, onPick, fixedScale, favorite}){
  const {pos,totalW,height}=useMemo(()=>BK.layout(),[]);
  const segs=useMemo(()=>BK.connectors(pos),[pos]);
  const wrapRef=useRef(); const [scale,setScale]=useState(fixedScale||1);
  useEffect(()=>{
    if(fixedScale){ setScale(fixedScale); return; }
    const el=wrapRef.current; if(!el||typeof ResizeObserver==='undefined') return;
    const fit=()=>{ const w=el.clientWidth; setScale(Math.min(1, Math.max(.6, w/totalW))); };
    fit(); const ro=new ResizeObserver(fit); ro.observe(el); return ()=>ro.disconnect();
  },[fixedScale,totalW]);
  return (
    <div ref={wrapRef} className="w-full" style={{overflowX:'auto'}}>
      <div style={{width:totalW*scale, height:height*scale, position:'relative', margin:'0 auto'}}>
        <div style={{width:totalW, height, position:'absolute', top:0, left:0, transformOrigin:'top left', transform:`scale(${scale})`}}>
          <svg className="bk-conn" width={totalW} height={height} viewBox={`0 0 ${totalW} ${height}`}>
            {segs.map((d,i)=><path key={i} d={d} fill="none" stroke="rgba(255,46,136,.5)" strokeWidth="2"/>)}
          </svg>
          {BK.allIds.map(id=>(
            <BracketMatch key={id} id={id} teams={resolved.teams} winnerOf={resolved.winnerOf} onPick={onPick} pos={pos} favorite={favorite} />
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SIMULATION & RANDOM
   ============================================================ */
function pickWeighted(a,b, sharp=1){
  if(!a) return b; if(!b) return a;
  const sa=Math.pow(STRENGTH(a),sharp), sb=Math.pow(STRENGTH(b),sharp);
  return Math.random() < sa/(sa+sb) ? a : b;
}
function orderGroup(codes, mode){
  // mode 'random' -> shuffle; 'sim' -> sort by strength + noise
  if(mode==='random'){ const a=[...codes]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  return [...codes].map(c=>[c, STRENGTH(c)+Math.random()*45]).sort((x,y)=>y[1]-x[1]).map(x=>x[0]);
}
function simulate(mode){
  const st = defaultState();
  GROUP_LETTERS.forEach(g=>{ st.standings[g]=orderGroup(GROUPS[g],mode); });
  // rank thirds
  const thirds = GROUP_LETTERS.map(g=>({g, s:STRENGTH(st.standings[g][2])+(mode==='random'?Math.random()*200:Math.random()*40)}));
  st.thirdRanking = thirds.sort((a,b)=>b.s-a.s).map(x=>x.g);
  // play out knockout deterministically in id order
  const sharp = mode==='random'?0:6;
  const allIds = [...R32.map(m=>m.id), ...LATER.map(m=>m.id)];
  // resolve progressively: we need teams as we set picks
  let res = resolveBracket(st);
  allIds.forEach(id=>{
    const t = res.teams[id];
    if(t && (t.home||t.away)){
      st.picks[id] = mode==='random' ? (Math.random()<0.5? (t.home||t.away):(t.away||t.home)) : pickWeighted(t.home,t.away,sharp);
      res = resolveBracket(st);
    }
  });
  return st;
}

/* ---- Monte Carlo title odds (FIFA-rank weighted) ---- */
function simOnce(){
  const standings={}; GROUP_LETTERS.forEach(g=>standings[g]=orderGroup(GROUPS[g],'sim'));
  const thirdRanking = GROUP_LETTERS.map(g=>({g,s:STRENGTH(standings[g][2])+Math.random()*40})).sort((a,b)=>b.s-a.s).map(x=>x.g);
  const base = resolveBracket({standings, thirdRanking, picks:{}});  // R32 fixtures only
  const winners={}, at={};
  R32.forEach(m=>{ const t=base.teams[m.id]; at[m.id]=[t.home,t.away]; winners[m.id]=pickWeighted(t.home,t.away,6); });
  LATER.forEach(m=>{
    const get = ref => ref.w!==undefined ? winners[ref.w]
      : (()=>{ const t=at[ref.l], w=winners[ref.l]; return w? (w===t[0]?t[1]:t[0]) : null; })();
    const h=get(m.a), a=get(m.b); at[m.id]=[h,a]; winners[m.id]=pickWeighted(h,a,6);
  });
  return {at, winners};
}
function runOdds(n=4000){
  const reach={}; Object.keys(TEAMS).forEach(c=>reach[c]={R32:0,R16:0,QF:0,SF:0,FINAL:0,CHAMP:0});
  const R16=LATER.filter(m=>m.round==='R16'), QF=LATER.filter(m=>m.round==='QF'), SF=LATER.filter(m=>m.round==='SF');
  for(let k=0;k<n;k++){
    const {at,winners}=simOnce();
    R32.forEach(m=>{ const [h,a]=at[m.id]; if(h)reach[h].R32++; if(a)reach[a].R32++; const w=winners[m.id]; if(w)reach[w].R16++; });
    R16.forEach(m=>{ const w=winners[m.id]; if(w)reach[w].QF++; });
    QF.forEach(m=>{ const w=winners[m.id]; if(w)reach[w].SF++; });
    SF.forEach(m=>{ const w=winners[m.id]; if(w)reach[w].FINAL++; });
    const champ=winners[104]; if(champ)reach[champ].CHAMP++;
  }
  return Object.keys(reach).map(c=>{
    const r=reach[c]; const o={code:c}; Object.keys(r).forEach(k=>o[k]=r[k]/n); return o;
  }).sort((a,b)=> b.CHAMP-a.CHAMP || b.FINAL-a.FINAL || b.SF-a.SF || b.R16-a.R16);
}
const pct = v => v>=0.095 ? Math.round(v*100)+'%' : v>=0.01 ? (v*100).toFixed(1)+'%' : v>0 ? '<1%' : '—';

function OddsModal({onClose, favorite}){
  const [rows,setRows]=useState(null);
  useEffect(()=>{ const t=setTimeout(()=>{ try{ setRows(runOdds(4000)); }catch(e){ setRows([]); } }, 30); return ()=>clearTimeout(t); },[]);
  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-start justify-center p-3 overflow-auto" onClick={onClose}>
      <div className="glass rounded-2xl max-w-xl w-full p-4 my-6 slidein" onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-3">
          <div>
            <h3 className="font-black text-lg">{tr('oddsTitle')}</h3>
            <p className="text-[11px] text-white/45">{tr('oddsSub')}</p>
          </div>
          <button onClick={onClose} className="text-white/50 hover:text-white text-2xl leading-none px-1">×</button>
        </div>
        {!rows ? (
          <div className="py-16 text-center text-white/50"><div className="text-3xl mb-2 pop">🎲</div>{tr('oddsRunning')}</div>
        ) : (
          <div className="overflow-x-auto max-h-[70vh]">
            <table className="w-full text-xs">
              <thead className="text-white/40 sticky top-0 bg-pitch-900/90 backdrop-blur">
                <tr><th className="text-left py-1 pl-1">{tr('colTeam')}</th><th className="px-2">{tr('colWin')}</th><th className="px-2">{tr('colFinal')}</th><th className="px-2">{tr('colSF')}</th><th className="px-2">{tr('colQF')}</th><th className="px-2 pr-1">{tr('colR16')}</th></tr>
              </thead>
              <tbody>
                {rows.filter(r=>r.R32>0.001).slice(0,32).map((r,i)=>(
                  <tr key={r.code} className={'border-t border-white/5 '+(favorite===r.code?'text-gold':'')}>
                    <td className="py-1.5 pl-1 whitespace-nowrap"><span className="text-white/30 mr-1 tabular-nums">{i+1}</span><Flag code={r.code}/> <span className="font-semibold">{TEAMS[r.code].name}{favorite===r.code?' ★':''}</span></td>
                    <td className="text-center px-2 font-bold text-neon">{pct(r.CHAMP)}</td>
                    <td className="text-center px-2 text-white/75">{pct(r.FINAL)}</td>
                    <td className="text-center px-2 text-white/55">{pct(r.SF)}</td>
                    <td className="text-center px-2 text-white/45">{pct(r.QF)}</td>
                    <td className="text-center px-2 pr-1 text-white/35">{pct(r.R16)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <p className="text-[10px] text-white/30 mt-2">{tr('oddsNote')}</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const STEPS = [
  {key:'groups', lk:'stepGroups'},
  {key:'thirds', lk:'stepThirds'},
  {key:'knockout', lk:'stepKnockout'},
  {key:'results', lk:'stepResults'},
];
const STEP_IDX = Object.fromEntries(STEPS.map((s,i)=>[s.key,i]));
function initMaxStep(s){
  try{ const r=resolveBracket(s); if(r.champion) return 3; if(Object.keys(s.picks||{}).length) return 2; }catch(e){}
  return 0;
}

function App(){
  const [state, setState] = useState(loadInitial);
  const [step, setStep] = useState('groups');
  const [maxStep, setMaxStep] = useState(()=>initMaxStep(loadInitial()));
  const [toast, setToast] = useState(null);
  const [busy, setBusy] = useState(false);
  const [showOdds, setShowOdds] = useState(false);
  const sheetRef = useRef(null);

  // persist
  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }, [state]);

  // apply colour theme via CSS variables
  useEffect(()=>{
    const th = THEMES[state.theme] || THEMES.magenta; const r = document.documentElement.style;
    th.c.forEach((c,i)=>r.setProperty('--c'+(i+1), c));
    th.glow.forEach((g,i)=>r.setProperty('--g'+(i+1), g));
  }, [state.theme]);
  // reflect language on <html lang> for a11y/SEO
  useEffect(()=>{ try{ document.documentElement.lang = state.lang||'en'; }catch(e){} }, [state.lang]);

  LANG = I18N[state.lang] ? state.lang : 'en';             // set active language before children render
  const resolved = useMemo(()=>resolveBracket(state), [state]);
  const champ = !!resolved.champion;                       // Final decided → results unlock
  const complete = champ && !!resolved.third;              // Final + 3rd-place done → export unlocks
  useEffect(()=>{ if(champ) setMaxStep(m=>Math.max(m,3)); }, [champ]);

  const flash = msg => { setToast(msg); setTimeout(()=>setToast(null), 2200); };
  const goto = key => {
    if(STEP_IDX[key] <= maxStep){ setStep(key); window.scrollTo({top:0,behavior:'smooth'}); }
    else flash(tr('lockedStep'));
  };
  const unlockTo = key => setMaxStep(m=>Math.max(m, STEP_IDX[key]));

  const setStandings = (g, order)=> setState(s=>({...s, standings:{...s.standings, [g]:order}}));
  const setThirdRanking = order => setState(s=>({...s, thirdRanking:order}));
  const setGroupScore = (letter, idx, side, value)=> setState(s=>{
    const gs={...s.groupScores}; const grp={...(gs[letter]||{})};
    grp[idx]={...(grp[idx]||{h:null,a:null}), [side]:value}; gs[letter]=grp;
    const comp=computeGroup(letter, GROUPS[letter], gs[letter]);
    const standings={...s.standings, [letter]:comp.order};
    return {...s, groupScores:gs, standings, thirdRanking:computeThirdRanking(standings, gs)};
  });
  const clearGroupScores = (letter)=> setState(s=>{
    const gs={...s.groupScores}; delete gs[letter];
    const standings={...s.standings, [letter]:[...GROUPS[letter]]};
    return {...s, groupScores:gs, standings, thirdRanking:computeThirdRanking(standings, gs)};
  });
  const autoRankThirds = ()=> setState(s=>({...s, thirdRanking:computeThirdRanking(s.standings, s.groupScores)}));
  const setFavorite = code => setState(s=>({...s, favorite:code||null}));
  const setTheme = th => setState(s=>({...s, theme:th}));
  const setLang = l => setState(s=>({...s, lang:l}));
  const onPick = (id, code)=> setState(s=>{
    const picks={...s.picks};
    if(picks[id]===code) delete picks[id]; else picks[id]=code;
    return {...s, picks:clearDownstream(id, {...s, picks})};
  });

  const doRandom = ()=>{ setState(simulate('random')); setMaxStep(3); flash(tr('toastRandom')); setStep('results'); };
  const doSim    = ()=>{ setState(simulate('sim'));    setMaxStep(3); flash(tr('toastSim')); setStep('results'); };
  const doReset  = ()=>{ setState({...defaultState(), lang:state.lang, theme:state.theme}); setMaxStep(0); flash(tr('toastReset')); setStep('groups'); };

  const doShare = async ()=>{
    const url = location.origin+location.pathname+'#s='+encodeState(state);
    try{ await navigator.clipboard.writeText(url); flash(tr('toastShareCopied')); }
    catch(e){ location.hash='s='+encodeState(state); flash(tr('toastShareBar')); }
  };

  const exportImage = async (asPdf)=>{
    if(!complete){ flash(tr('toastExportLock')); return; }
    setBusy(true); flash(tr('toastRendering'));
    await new Promise(r=>requestAnimationFrame(()=>setTimeout(r,80)));
    try{
      const node = sheetRef.current.firstChild; // the fixed-width composition
      const w = node.offsetWidth || 2700;
      const canvas = await html2canvas(node, {backgroundColor:'#0a0a16', scale:2, useCORS:true, width:w, windowWidth:w+60});
      if(asPdf){
        const {jsPDF}=window.jspdf;
        const img=canvas.toDataURL('image/png');
        const pdf=new jsPDF({orientation:'l', unit:'px', format:[canvas.width,canvas.height]});
        pdf.addImage(img,'PNG',0,0,canvas.width,canvas.height);
        pdf.save('wc2026-bracket.pdf'); flash(tr('toastPdf'));
      } else {
        const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='wc2026-bracket.png'; a.click();
        flash(tr('toastPng'));
      }
    } catch(e){ flash(tr('toastExportFail')); }
    setBusy(false);
  };

  return (
    <div className="min-h-screen pitch-bg">
      {/* HEADER */}
      <header className="sticky top-0 z-30 backdrop-blur-md bg-pitch-950/70 border-b border-white/5">
        <div className="spectrum-bar w-full" />
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2.5">
            <Emblem />
            <div>
              <h1 className="font-black leading-none text-lg sm:text-xl spectrum-text tracking-tight">WORLD CUP 26</h1>
              <div className="flex items-center gap-1.5 mt-1">
                <span className="text-[10px] text-white/45 leading-none font-semibold">{tr('brandSub')}</span>
                <span className="text-white/15">•</span>
                <span className="text-xs leading-none" title="Canada · Mexico · USA">🇨🇦 🇲🇽 🇺🇸</span>
              </div>
            </div>
          </div>
          <div className="flex-1" />
          <div className="flex items-center gap-1.5 flex-wrap text-xs">
            <ToolBtn onClick={doRandom}>🎲 {tr('btnRandom')}</ToolBtn>
            <ToolBtn onClick={doSim}>🤖 {tr('btnSim')}</ToolBtn>
            <ToolBtn onClick={()=>setShowOdds(true)}>📊 {tr('btnOdds')}</ToolBtn>
            <ToolBtn onClick={doShare}>🔗 {tr('btnShare')}</ToolBtn>
            <ToolBtn onClick={()=>exportImage(false)} disabled={!complete||busy}>🖼️ PNG</ToolBtn>
            <ToolBtn onClick={()=>exportImage(true)} disabled={!complete||busy}>📄 PDF</ToolBtn>
            <ToolBtn onClick={doReset} danger>↺ {tr('btnReset')}</ToolBtn>
          </div>
        </div>
        {/* favourite + theme + language bar */}
        <div className="max-w-6xl mx-auto px-4 pb-2 flex items-center gap-2 flex-wrap">
          <span className="text-[11px] text-white/40 font-semibold">★ {tr('favourite')}</span>
          <select value={state.favorite||''} onChange={e=>setFavorite(e.target.value)}
            className="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-[11px] text-white/80 outline-none focus:border-neon/50 max-w-[160px]">
            <option value="">{tr('none')}</option>
            {Object.keys(TEAMS).sort((a,b)=>TEAMS[a].name.localeCompare(TEAMS[b].name)).map(c=>(
              <option key={c} value={c}>{TEAMS[c].flag} {TEAMS[c].name}</option>
            ))}
          </select>
          <span className="w-px h-4 bg-white/10 mx-1" />
          <span className="text-[11px] text-white/40 font-semibold">{tr('theme')}</span>
          <div className="flex items-center gap-1">
            {Object.entries(THEMES).map(([k,th])=>(
              <button key={k} title={th.label} onClick={()=>setTheme(k)}
                className={'w-5 h-5 rounded-full border-2 transition '+(state.theme===k?'border-white scale-110':'border-white/20 hover:border-white/50')}
                style={{background:`linear-gradient(135deg,${th.c[0]},${th.c[2]},${th.c[3]})`}} />
            ))}
          </div>
          <span className="w-px h-4 bg-white/10 mx-1" />
          <span className="text-[11px] text-white/40 font-semibold">{tr('language')}</span>
          <div className="flex items-center gap-0.5">
            {LANGS.map(([code,lbl])=>(
              <button key={code} onClick={()=>setLang(code)}
                className={'px-1.5 py-0.5 rounded text-[10px] font-bold border transition '+(state.lang===code?'bg-neon text-pitch-950 border-neon':'border-white/15 text-white/55 hover:border-neon/40')}>{lbl}</button>
            ))}
          </div>
        </div>
        {/* STEP NAV */}
        <div className="max-w-6xl mx-auto px-4 pb-2 flex gap-1.5">
          {STEPS.map((s,i)=>{
            const locked = i>maxStep;
            return (
              <button key={s.key} onClick={()=>goto(s.key)} disabled={locked}
                className={'flex-1 py-2 rounded-lg text-xs font-bold border transition '
                  +(step===s.key?'bg-neon text-pitch-950 border-neon'
                    : locked?'bg-white/[.02] text-white/25 border-white/5 cursor-not-allowed'
                    : 'bg-white/5 text-white/60 border-white/10 hover:border-neon/40')}>
                <span className="mr-1 opacity-70">{locked?'🔒':i+1}</span>{tr(s.lk)}
              </button>
            );
          })}
        </div>
      </header>

      {/* BODY */}
      <main className="max-w-6xl mx-auto px-4 py-6">
        {step==='groups'   && <GroupStage state={state} setStandings={setStandings} setGroupScore={setGroupScore} clearGroupScores={clearGroupScores} />}
        {step==='thirds'   && <ThirdPlace state={state} setThirdRanking={setThirdRanking} autoRankThirds={autoRankThirds} favorite={state.favorite} />}
        {step==='knockout' && <Knockout resolved={resolved} onPick={onPick} favorite={state.favorite} />}
        {step==='results'  && <Results resolved={resolved} favorite={state.favorite} />}
      </main>

      {/* STAGE FOOTER (gated progression) */}
      <StageFooter step={step} champ={champ} complete={complete} goto={goto} unlockTo={unlockTo} setStep={setStep} />

      {/* off-screen export composition */}
      <ExportSheet ref={sheetRef} state={state} resolved={resolved} />
      <footer className="max-w-6xl mx-auto px-4 pb-10 text-center">
        <div className="spectrum-bar w-24 mx-auto rounded-full mb-3 opacity-60" />
        <p className="text-[11px] text-white/35 leading-relaxed">
          {tr('footer1')}<br/>
          {tr('footer2')}
        </p>
      </footer>

      {showOdds && <OddsModal onClose={()=>setShowOdds(false)} favorite={state.favorite} />}

      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 glass px-4 py-2 rounded-full text-sm font-semibold pop glow">{toast}</div>}
    </div>
  );
}

      <defs>

          <stop offset="0" stopColor="#ff2e88"/><stop offset=".4" stopColor="#a855f7"/>

function ToolBtn({children, onClick, danger, disabled, title}){
  return <button onClick={disabled?undefined:onClick} disabled={disabled} title={title}
    className={'px-2.5 py-1.5 rounded-lg font-semibold border transition '
      +(disabled?'border-white/5 text-white/25 cursor-not-allowed'
        :danger?'border-red-500/30 text-red-300 hover:bg-red-500/10'
        :'border-white/10 text-white/80 hover:border-neon/50 hover:text-neon')}>
    {children}</button>;
}

function StageFooter({step, champ, complete, goto, unlockTo, setStep}){
  const proceed = to => { unlockTo(to); setStep(to); window.scrollTo({top:0,behavior:'smooth'}); };
  const Btn = ({onClick,children,primary,disabled})=>(
    <button onClick={disabled?undefined:onClick} disabled={disabled}
      className={'px-5 py-2.5 rounded-xl font-bold text-sm transition '
        +(disabled?'bg-white/5 text-white/30 cursor-not-allowed'
          :primary?'spectrum text-pitch-950 hover:opacity-90 shadow-lg':'glass hover:border-neon/50')}>{children}</button>
  );
  const prev = STEP_IDX[step]>0 ? STEPS[STEP_IDX[step]-1] : null;
  return (
    <div className="max-w-6xl mx-auto px-4 pb-8 flex justify-between items-center gap-3">
      {prev ? <Btn onClick={()=>goto(prev.key)}>← {tr(prev.lk)}</Btn> : <span/>}
      {step==='groups'   && <Btn primary onClick={()=>proceed('thirds')}>{tr('contTo',{x:tr('stepThirds')})}</Btn>}
      {step==='thirds'   && <Btn primary onClick={()=>proceed('knockout')}>{tr('contTo',{x:tr('stepKnockout')})}</Btn>}
      {step==='knockout' && <Btn primary disabled={!champ} onClick={()=>proceed('results')}>{champ?tr('viewResults'):tr('pickFinal')}</Btn>}
      {step==='results'  && <span className="text-xs text-white/40 self-center text-right">{complete?tr('exportHint'):tr('toastExportLock')}</span>}
    </div>
  );
}
function NavBtn({dir, step, setStep}){
  const i = STEPS.findIndex(s=>s.key===step);
  const tgt = dir==='next'?STEPS[i+1]:STEPS[i-1];
  if(!tgt) return <span/>;
  return <button onClick={()=>{setStep(tgt.key); window.scrollTo({top:0,behavior:'smooth'});}}
    className="px-4 py-2 rounded-xl glass font-semibold text-sm hover:border-neon/50 transition">
    {dir==='prev'?'← '+tgt.label : tgt.label+' →'}</button>;
}

/* clear picks downstream of a changed match so the bracket stays consistent */
function clearDownstream(changedId, state){
  const picks = {...state.picks};
  // map: matchId -> matches that consume its winner/loser
  const consumers = {};
  LATER.forEach(m=>{
    [m.a,m.b].forEach(r=>{ const src=r.w!==undefined?r.w:r.l; (consumers[src]=consumers[src]||[]).push(m.id); });
  });
  const stack=[changedId];
  const visited=new Set();
  while(stack.length){
    const id=stack.pop();
    (consumers[id]||[]).forEach(cid=>{
      if(!visited.has(cid)){ visited.add(cid); delete picks[cid]; stack.push(cid); }
    });
  }
  return picks;
}
